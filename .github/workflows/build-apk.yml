name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      run_tests:
        description: 'Run unit tests before build'
        required: false
        default: true
        type: boolean

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apk:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Gradle wrapper permissions
        run: sed -i 's/\r$//' gradlew && chmod +x gradlew

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        if: ${{ inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Decode signing key
        if: ${{ inputs.build_type == 'release' }}
        run: echo "${{ secrets.RELEASE_SIGNING_KEY }}" | base64 -d > app/release-keystore.jks

      - name: Build release APK
        if: ${{ inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --no-daemon
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || echo "0")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "### 📦 APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** ${{ inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** $APK_PATH" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: datasage-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          retention-days: 30
